models:
  xgb:
    imports: "from xgboost import XGBClassifier, XGBRegressor"
    classifier: "XGBClassifier(random_state=42)"
    regressor: "XGBRegressor(random_state=42)"
  lgb:
    imports: "from lightgbm import LGBMClassifier, LGBMRegressor"
    classifier: "LGBMClassifier(random_state=42, verbose=-1)"
    regressor: "LGBMRegressor(random_state=42, verbose=-1)"
  cat:
    imports: "from catboost import CatBoostClassifier, CatBoostRegressor"
    classifier: "CatBoostClassifier(random_state=42, verbose=0)"
    regressor: "CatBoostRegressor(random_state=42, verbose=0)"
  hist:
    imports: "from sklearn.ensemble import HistGradientBoostingClassifier, HistGradientBoostingRegressor"
    classifier: "HistGradientBoostingClassifier(random_state=42)"
    regressor: "HistGradientBoostingRegressor(random_state=42)"
