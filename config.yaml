# ---------------------------------------------------------
# Agentic AutoML Pipeline Configuration
# ---------------------------------------------------------

# The path to the training dataset CSV file (required).
# Branch naming: paths like data/<name>/... use Git branch <name> for experiments (main stays backbone-only).
dataset_path: "data/train.csv"

# The exact name of the target column you want to predict (required)
target_col: "target"

# LLM model to use for the agentic loop (optional)
# Overrides the AUTOML_MODEL environment variable if set.
# Uses litellm routing format: "provider/model-name"
# Default: gemini/gemini-2.0-flash
# Examples:
#   Gemini:     gemini/gemini-2.0-flash
#   OpenAI:     openai/gpt-4o
#   Anthropic:  anthropic/claude-3-5-sonnet-20241022
#   Ollama:     ollama/llama3.2   (requires Ollama running locally)
model: ollama/qwen3.5:2b

# Ollama base URL (optional, only needed if using an ollama/* model)
# Default: http://localhost:11434
# Change this if Ollama is running on a different host or port.
ollama_base_url: ~

# The path to the testing dataset CSV file (optional)
# If provided, the pipeline will automatically generate a submission.csv
# using the final model trained on the full train dataset.
test_path: "data/test.csv"

# Custom evaluation metric for Cross Validation (optional)
# If left blank (null or ~), it defaults to:
# - 'roc_auc' for classification tasks
# - 'neg_mean_squared_error' for regression tasks
# Example: "log_loss", "f1", "neg_mean_absolute_error"
metric: ~

# Whether the final submission.csv should output probabilities (true) or discrete classes (false)
# Default is true, which is common for Kaggle classification metrics like log_loss or roc_auc.
# Set to false if the competition requires absolute class predictions (e.g. 0 or 1).
pred_prob: true

# The path to an example submission file provided by Kaggle (optional)
# The pipeline can inspect this file to automatically determine if the competition
# requires probabilities or discrete classes, overriding pred_prob.
example_submission: ~

# Automatically submit the final submission.csv to Kaggle when all iterations are complete
# Requires the Kaggle CLI to be installed and authenticated (~/.kaggle/kaggle.json)
auto_kaggle_submit: false

# The number of iterations the Agentic LLM should run to improve the model
iterations: 5

# The maximum execution time (in seconds) allowed for a single generated model script
# This prevents the LLM from accidentally writing infinite loops or exhaustive grid searches.
timeout: 600

# Weights & Biases configuration
wandb:
  enabled: true
  entity: "kevinwangstats"
