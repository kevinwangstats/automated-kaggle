# ---------------------------------------------------------
# CI/CD Test Configuration: Kaggle Titanic Dataset
# https://www.kaggle.com/competitions/titanic/overview
# ---------------------------------------------------------
# This config is used by the GitHub Actions CI pipeline
# (.github/workflows/titanic_ci.yml) to validate the
# baseline engine on every push to main.
#
# To run this test locally:
#   1. Download Titanic data: kaggle competitions download -c titanic
#   2. Unzip into data/titanic/
#   3. Run: python main.py --config tests/titanic_config.yaml -y
# ---------------------------------------------------------

# --- CORE REQUIRED SETTINGS ---

ci_test_mode: true

# workspace_root: The directory where ephemeral pipeline files are isolated.
workspace_root: ".workspaces"

# run_mode: Determines behavior if previous state is detected
run_mode: "prompt"

dataset_path: "data/titanic_test/train.csv"
target_col: "Survived"
test_path: "data/titanic_test/test.csv"
example_submission: "data/titanic_test/gender_submission.csv"

# roc_auc is standard for binary classification
metric: "roc_auc"

# Titanic requires discrete class predictions (0 or 1), not probabilities
pred_type: "0/1"

# Set to 1 to test one full cycle of the LLM agent loop
iterations: 1

# Generous timeout because CPU inference on GitHub runners is slower
timeout: 600

# Point LiteLLM to the local Ollama instance running on the CI server
model: ollama/qwen2.5-coder:0.5b

# The sampling temperature for the LLM
temperature: 0

# Limits the number of rows loaded into memory
max_rows: ~

# Weights & Biases configuration
wandb:
  enabled: false
  entity: "kevinwangstats"

# Controls automated Kaggle submissions
auto_kaggle_submit: "never"

# The URL where your local Ollama instance is running
ollama_base_url: ~
