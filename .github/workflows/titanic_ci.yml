name: Baseline CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-baseline:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Titanic Data
      env:
        KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      run: |
        mkdir -p ~/.kaggle
        echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
        chmod 600 ~/.kaggle/access_token
        mkdir -p data/titanic
        kaggle competitions download -c titanic -p data/titanic
        unzip data/titanic/titanic.zip -d data/titanic/

    - name: Generate Titanic Config
      run: |
        cat << 'EOF' > titanic_config.yaml
        dataset_path: "data/titanic/train.csv"
        target_col: "Survived"
        test_path: "data/titanic/test.csv"
        metric: "roc_auc"
        iterations: 0
        timeout: 600
        EOF

    - name: Run Baseline Engine
      run: |
        python main.py --config titanic_config.yaml -y
