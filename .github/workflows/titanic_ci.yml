name: Baseline CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-baseline:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Titanic Data
      env:
        KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"github-actions\",\"key\":\"$KAGGLE_API_TOKEN\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        mkdir -p data/titanic
        kaggle competitions download -c titanic -p data/titanic --force
        unzip -o data/titanic/titanic.zip -d data/titanic/

    - name: Install and Start Ollama (Micro-Model)
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        # Start Ollama server in the background
        ollama serve &
        # Give the server a few seconds to initialize
        sleep 5
        # Pull a 1.5B coder model for better reliability
        ollama pull qwen2.5-coder:1.5b

    - name: Run Pipeline (Baseline + Agent Loop)
      run: |
        python main.py --config .github/configs/titanic_ci_config.yaml -y

    - name: Verify Submission File
      run: |
        # Submission file is now written into the isolated workspace directory
        # e.g. .workspaces/titanic_20260518_184437/submission.csv
        SUB_FILE=$(find .workspaces -name "submission.csv" -type f | head -n 1)
        if [ -z "$SUB_FILE" ]; then
          echo "Error: submission.csv was not found in any workspace!"
          exit 1
        fi
        echo "Found submission file at $SUB_FILE. Checking contents..."
        head -n 5 "$SUB_FILE"
