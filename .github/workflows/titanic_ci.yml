name: Baseline CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-baseline:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Titanic Data
      env:
        KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"github-actions\",\"key\":\"$KAGGLE_API_TOKEN\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        mkdir -p data/titanic
        kaggle competitions download -c titanic -p data/titanic --force
        unzip -o data/titanic/titanic.zip -d data/titanic/

    - name: Run Baseline Engine
      run: |
        python main.py --config .github/workflows/titanic_ci_config.yaml -y

    - name: Verify Submission File
      run: |
        # The submission file should be in data/titanic/submission.csv
        # because example_submission is data/titanic/gender_submission.csv
        SUB_FILE="data/titanic/submission.csv"
        if [ ! -f "$SUB_FILE" ]; then
          echo "Error: $SUB_FILE was not generated!"
          # Fallback check in case config changed or logic failed
          if [ -f "submission.csv" ]; then
            echo "Warning: Found submission.csv in root instead of $SUB_FILE"
            SUB_FILE="submission.csv"
          else
            exit 1
          fi
        fi
        echo "Found submission file at $SUB_FILE. Checking contents..."
        head -n 5 "$SUB_FILE"
