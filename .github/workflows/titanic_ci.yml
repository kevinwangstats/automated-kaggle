name: Baseline CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-baseline:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Titanic Data
      env:
        KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"github-actions\",\"key\":\"$KAGGLE_API_TOKEN\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        mkdir -p data/titanic
        kaggle competitions download -c titanic -p data/titanic --force
        unzip -o data/titanic/titanic.zip -d data/titanic/

    - name: Run Baseline Engine
      run: |
        python main.py --config tests/titanic_config.yaml -y
